name: CI

# Typecheck + lint every recipe on every push/PR.
# Actual inference runs are intentionally local: models are large and native
# runtime support is machine-specific.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recipes:
    name: typecheck + lint (${{ matrix.recipe }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Add each recipe folder here as it lands.
        recipe:
          - 01-completion-streaming
          - 02-embeddings-rag
          - 03-speech-to-text
          - 04-text-to-speech
          - 05-translation-indic
          - 06-tool-calling
    defaults:
      run:
        working-directory: recipes/${{ matrix.recipe }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: recipes/${{ matrix.recipe }}/package-lock.json

      # --ignore-scripts: skip the SDK's postinstall model/binary fetch in CI.
      # We only need types + lint here, not a runnable inference environment.
      - name: Install
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
